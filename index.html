<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vals Revision - PHY102 Magnetism</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
    :root {--primary:#1E3A8A; --secondary:#F59E0B; --accent:#10B981; --text:#1E293B; --danger:#EF4444;}
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body {background:linear-gradient(rgba(30,58,138,0.92), rgba(30,58,138,0.92)), url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1422') center/cover fixed; color:white; min-height:100vh;}
 .container { max-width:900px; margin:0 auto; padding:20px; }
    header { text-align:center; padding:30px; background:rgba(0,0,0,0.4); border-radius:20px; margin-bottom:20px; border:3px solid var(--secondary);}
 .logo { font-size:2.5rem; font-weight:800; color:var(--secondary);}
 .motto { font-size:1.1rem; color:var(--accent);}
 .quiz-box {background:white; color:var(--text); padding:30px; border-radius:20px;}
 .question {font-size:1.3rem; font-weight:700; margin-bottom:20px; color:var(--primary);}
 .options button {display:block; width:100%; padding:15px; margin:10px 0; border:2px solid #E2E8F0; background:white; border-radius:10px; cursor:pointer; text-align:left; font-weight:600; transition:0.2s;}
 .options button:hover {border-color:var(--primary); background:#EFF6FF;}
 .options button.selected {border-color:var(--primary); background:#DBEAFE;}
 .options button.correct {background:#D1FAE5; border-color:var(--accent);}
 .options button.wrong {background:#FEE2E2; border-color:var(--danger);}
 .stats {display:flex; justify-content:space-between; margin-bottom:15px; font-weight:700; font-size:1.1rem;}
 .timer {color:var(--danger);}
 .progress-bar {height:8px; background:#E2E8F0; border-radius:10px; margin-bottom:20px;}
 .progress {height:100%; background:var(--accent); border-radius:10px; width:1%; transition:0.3s;}
 .nav-btns {display:flex; justify-content:space-between; margin-top:20px;}
 .nav-btn {background:var(--primary); color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-weight:700;}
 .nav-btn:disabled {background:#94A3B8; cursor:not-allowed;}
 .submit-btn {background:var(--accent); color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-weight:700;}
 .timer-setup {text-align:center; margin-bottom:20px;}
 .timer-setup input {padding:8px; width:60px; border-radius:5px; border:2px solid var(--primary);}
</style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">VALS REVISION</div>
        <div class="motto">PHY 102 - Magnetism: 100 Questions</div>
    </header>

    <div id="setup" class="quiz-box">
        <h3 style="color:var(--primary); text-align:center;">Set Your Timer</h3>
        <div class="timer-setup">
            <p>How many minutes for this 100 questions?</p>
            <input type="number" id="minutes" value="50" min="5">
            <button class="submit-btn" onclick="startQuiz()">Start Quiz</button>
        </div>
    </div>

    <div id="quiz" class="quiz-box" style="display:none;">
        <div class="stats">
            <span>Question: <span id="qNum">1</span>/100</span>
            <span class="timer">Time: <span id="timer">50:00</span></span>
        </div>
        <div class="progress-bar"><div class="progress" id="progressBar"></div></div>
        <div class="question" id="questionText"></div>
        <div class="options" id="optionsBox"></div>
        <div class="nav-btns">
            <button class="nav-btn" id="prevBtn" onclick="prevQuestion()">← Previous</button>
            <button class="submit-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
        </div>
    </div>

    <div id="result" class="quiz-box" style="display:none;">
        <h3 style="color:var(--primary); text-align:center;">Quiz Complete!</h3>
        <h2 style="text-align:center; color:var(--accent); margin:20px 0;">Score: <span id="finalScore">0</span>/100</h2>
        <button class="submit-btn" onclick="location.reload()" style="width:100%;">Restart</button>
    </div>
</div>

let currentQ = 0;
let userAnswers = Array(100).fill(null);
let timeLeft = 50 * 60; // 50 minutes default
let timerInterval;

function startQuiz() {
    let mins = parseInt(document.getElementById('minutes').value);
    timeLeft = mins * 60;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    loadQuestion();
    startTimer();
}

function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60);
        let s = timeLeft%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        if(timeLeft <= 0) submitQuiz();
    }, 1000);
}

function loadQuestion() {
    let q = currentQuestions[currentQ];
    document.getElementById('qNum').innerText = currentQ + 1;
    document.getElementById('questionText').innerText = q.q;
    document.getElementById('progressBar').style.width = ((currentQ/100)*100) + '%';

    document.getElementById('prevBtn').disabled = currentQ === 0;
    document.getElementById('nextBtn').innerText = currentQ === 99? 'Submit' : 'Next →';

    let options = q.o;
    document.getElementById('optionsBox').innerHTML = '';
    options.forEach(opt => {
        let btn = document.createElement('button');
        btn.innerText = opt;
        if(userAnswers[currentQ] === opt) btn.classList.add('selected');
        btn.onclick = () => { userAnswers[currentQ] = opt; loadQuestion(); }
        document.getElementById('optionsBox').appendChild(btn);
    });
}

function nextQuestion() {
    if(currentQ < 99) { currentQ++; loadQuestion(); }
    else { submitQuiz(); }
}

function prevQuestion() {
    if(currentQ > 0) { currentQ--; loadQuestion(); }
}

function submitQuiz() {
    clearInterval(timerInterval);
    let score = 0;
    currentQuestions.forEach((q,i) => { if(userAnswers[i] === q.a) score++; });
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('finalScore').innerText = score;
}
</script>
</body>
</html>
